name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "apps/docs/**"
      - "bun.lock"
      - "package.json"
  pull_request:
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "apps/docs/**"
      - "bun.lock"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_OUTPUT_DIR: apps/docs/dist
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
  NODE_VERSION: "22.12.0"

jobs:
  deploy:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck docs
        run: bun run --cwd apps/docs typecheck

      - name: Build docs
        run: bun run --cwd apps/docs build

      - name: Validate Cloudflare configuration
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0

          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN CLOUDFLARE_PAGES_PROJECT_NAME; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured"
              missing=1
            fi
          done

          exit "$missing"

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.DOCS_OUTPUT_DIR }} --project-name=${{ env.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.head_ref || github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          packageManager: bun

      - name: Print deployment URLs
        if: steps.deploy.outcome == 'success'
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
          DEPLOYMENT_ALIAS_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}
        run: |
          echo "Deployment URL: ${DEPLOYMENT_URL}"

          if [ -n "${DEPLOYMENT_ALIAS_URL}" ]; then
            echo "Deployment alias URL: ${DEPLOYMENT_ALIAS_URL}"
          fi
