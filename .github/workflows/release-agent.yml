name: Release Agent

on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: hina-agent-linux-x86_64
            cross: false

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: hina-agent-linux-aarch64
            cross: true

          - target: x86_64-apple-darwin
            runner: macos-latest
            binary: hina-agent-darwin-x86_64
            cross: false

          - target: aarch64-apple-darwin
            runner: macos-latest
            binary: hina-agent-darwin-aarch64
            cross: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p hina-agent
          else
            cargo build --release --target ${{ matrix.target }} -p hina-agent
          fi

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/hina-agent ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum hina-agent-* > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
